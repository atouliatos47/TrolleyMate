<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrolleyMate</title>

    <!-- PWA -->
    <meta name="theme-color" content="#005EA5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TrolleyMate">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" sizes="180x180" href="/img/icon-180.png">
    <link rel="stylesheet" href="/css/style.css">
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <div class="header-left">
            <span class="app-logo">🛒</span>
            <span class="app-title">Trolley<span>Mate</span></span>
        </div>
        <div class="header-center" id="statsBar">Your list is empty</div>
        <div class="header-right">
            <div class="connection-badge" id="connectionBadge">○ Connecting</div>
        </div>
    </div>

    <!-- MAIN 2-COLUMN LAYOUT -->
    <div class="main-layout">

        <!-- LEFT: AISLES PANEL -->
        <div class="aisles-panel">
            <div class="panel-header">
                <h2>🏪 Store Aisles</h2>
                <span class="panel-sub">Tap a product to add to list</span>
            </div>
            <div class="aisles-container" id="aislesContainer">
                <!-- Aisles rendered here -->
            </div>
        </div>

        <!-- RIGHT: SHOPPING LIST PANEL -->
        <div class="list-panel">
            <div class="panel-header">
                <h2>📋 Shopping List</h2>
                <button class="clear-btn-sm" onclick="App.clearChecked()">🗑 Clear checked</button>
            </div>
            <div class="list-container" id="listContainer">
                <!-- List rendered here -->
            </div>
        </div>

    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal"></div>
    </div>

    <!-- SCRIPTS -->
    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/app.js"></script>

</body>
</html>
