<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrolleyMate</title>

    <!-- PWA -->
    <meta name="theme-color" content="#005EA5">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TrolleyMate">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" sizes="180x180" href="/img/icon-180.png">

    <link rel="stylesheet" href="/css/style.css">

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <div class="header-top">
            <div class="app-title">🛒 Trolley<span>Mate</span></div>
            <div class="connection-badge" id="connectionBadge">○ Connecting</div>
        </div>
        <div class="stats-bar" id="statsBar">Loading...</div>
    </div>

    <!-- LIST TAB -->
    <div class="content tab-content" data-tab="list">
        <button class="clear-btn" onclick="App.clearChecked()">🗑 Clear Checked Items</button>
        <div id="listContainer"></div>
    </div>

    <!-- ADD TAB -->
    <div class="content tab-content hidden" data-tab="add">
        <div class="add-form">
            <h2>➕ Add Item</h2>
            <div class="form-group">
                <label>Item Name</label>
                <input type="text" id="itemInput" placeholder="e.g. Milk, Bread, Eggs...">
            </div>
            <div class="form-group">
                <label>Aisle</label>
                <select id="aisleSelect">
                    <option value="">— Select Aisle —</option>
                </select>
            </div>
            <button class="add-btn" onclick="App.addItem()">Add to List</button>
        </div>
    </div>

    <!-- FAVOURITES TAB -->
    <div class="content tab-content hidden" data-tab="favourites">
        <div id="favouritesContainer"></div>
    </div>

    <!-- BOTTOM TABS -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="list">
            <span class="tab-icon">📋</span>
            List
        </button>
        <button class="tab-btn" data-tab="add">
            <span class="tab-icon">➕</span>
            Add
        </button>
        <button class="tab-btn" data-tab="favourites">
            <span class="tab-icon">⭐</span>
            Favourites
        </button>
    </div>

    <!-- MODAL -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal"></div>
    </div>

    <!-- SCRIPTS -->
    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/app.js"></script>

</body>
</html>
